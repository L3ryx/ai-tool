<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI AliExpress Finder</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container { width:500px; text-align:center; }

button {
  background:#00ff88;
  border:none;
  padding:15px;
  width:100%;
  font-size:18px;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}
button:hover { opacity:0.8; }

.progress {
  width:100%;
  background:#111;
  border-radius:20px;
  margin-top:15px;
}
.bar {
  height:20px;
  width:0%;
  background:linear-gradient(90deg,#00ff88,#00ccff);
  border-radius:20px;
  transition:0.4s;
}

.spinner {
  display:none;
  margin-top:10px;
}

.logs {
  margin-top:15px;
  max-height:120px;
  overflow:auto;
  background:#111;
  padding:10px;
  border-radius:10px;
}

.product {
  background:#111;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.score-green { color:#00ff88; }
.score-orange { color:orange; }
.score-red { color:red; }

</style>
</head>
<body>

<div class="container">

<h2>🔥 AI AliExpress Finder</h2>

<input type="text" id="imgbb" placeholder="IMGBB KEY">
<input type="text" id="serpapi" placeholder="SERPAPI KEY">
<input type="text" id="openai" placeholder="OPENAI KEY">
<input type="file" id="image">

<button onclick="start()">START</button>

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="spinner" id="spinner">⏳ Analyzing...</div>

<div class="logs" id="logs"></div>
<div id="results"></div>

</div>

<script>
const socket = io();
let socketId;

socket.on("connect", () => {
  socketId = socket.id;
});

socket.on("log", msg => {
  document.getElementById("logs").innerHTML += msg + "<br>";
  document.getElementById("logs").scrollTop = 9999;
});

function scoreColor(score){
  if(score > 70) return "score-green";
  if(score > 40) return "score-orange";
  return "score-red";
}

async function start(){
  document.getElementById("spinner").style.display="block";
  document.getElementById("bar").style.width="20%";

  const form = new FormData();
  form.append("image", document.getElementById("image").files[0]);
  form.append("imgbb", document.getElementById("imgbb").value);
  form.append("serpapi", document.getElementById("serpapi").value);
  form.append("openai", document.getElementById("openai").value);
  form.append("socketId", socketId);

  const res = await fetch("/analyze", { method:"POST", body:form });
  const data = await res.json();

  document.getElementById("bar").style.width="100%";
  document.getElementById("spinner").style.display="none";

  displayResults(data);
}

function displayResults(data){
  const container = document.getElementById("results");
  container.innerHTML = "";

  data.products.forEach((p,i)=>{
    const score = data.scores[i]?.score || 0;
    container.innerHTML += `
      <div class="product">
        <img src="${p.thumbnail}" width="80"><br>
        <b>${p.title}</b><br>
        <span class="${scoreColor(score)}">Score: ${score}</span><br>
        <a href="${p.link}" target="_blank">View Product</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
