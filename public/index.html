<!DOCTYPE html>
<html>
<head>
<title>AI Tool</title>
</head>
<body style="background:black;color:white;font-family:monospace;">

<h2>🔥 Live Logs</h2>

<div id="logs" style="
background:#111;
padding:20px;
height:400px;
overflow:auto;
border:1px solid lime;
"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const logsDiv = document.getElementById("logs");

socket.on("log", (data) => {

  const div = document.createElement("div");

  div.innerHTML = `
    <span style="color:gray">[${data.time}]</span>
    <span style="color:cyan">[${data.type}]</span>
    ${data.message}
  `;

  logsDiv.appendChild(div);

  logsDiv.scrollTop = logsDiv.scrollHeight;

});

</script>

</body>
</html>
