<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Pipeline Pro</title>

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* ================= CONTAINER ================= */

.container {
    width: 420px;
}

/* ================= INPUTS ================= */

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

/* ================= BUTTON PRO ================= */

button {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
    color: black;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px #00ff88;
}

button:hover {
    transform: scale(1.05);
}

button.loading {
    background: #ffaa00;
    box-shadow: 0 0 25px #ffaa00;
}

/* ================= PROGRESS BAR ================= */

.progress-container {
    width: 100%;
    background: #111;
    border-radius: 20px;
    margin-top: 20px;
    height: 22px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff88, #00ccff);
    border-radius: 20px;
    transition: width 0.6s ease;
}

/* ================= LOGS ================= */

#logs {
    margin-top: 20px;
    font-size: 13px;
    max-height: 150px;
    overflow-y: auto;
    background: #111;
    padding: 10px;
    border-radius: 10px;
}

</style>
</head>
<body>

<div class="container">

<h2>🚀 AI Product Analyzer</h2>

<p>IMGBB</p>
<input type="text" id="imgbb">

<p>SerpAPI</p>
<input type="text" id="serpapi">

<p>OpenAI</p>
<input type="text" id="openai">

<input type="file" id="image">

<button id="startBtn" onclick="startPipeline()">START</button>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>

<div id="logs"></div>

</div>

<script>

/* ================= START PIPELINE ================= */

async function startPipeline() {

    const btn = document.getElementById("startBtn");
    const progress = document.getElementById("progress");

    btn.classList.add("loading");
    btn.innerText = "LOADING...";
    progress.style.width = "5%";

    const file = document.getElementById("image").files[0];

    const formData = new FormData();
    formData.append("image", file);
    formData.append("imgbb", document.getElementById("imgbb").value);
    formData.append("serpapi", document.getElementById("serpapi").value);
    formData.append("openai", document.getElementById("openai").value);

    progress.style.width = "20%"; // Upload

    const res = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    progress.style.width = "80%"; // Processing

    const data = await res.json();

    progress.style.width = "100%"; // Done

    document.getElementById("logs").innerText =
        JSON.stringify(data, null, 2);

    btn.innerText = "DONE ✅";
    btn.classList.remove("loading");

    loadLogs();
}

/* ================= LIVE LOGS ================= */

async function loadLogs() {

    const res = await fetch("/logs");
    const logs = await res.json();

    const progress = document.getElementById("progress");

    if (logs.length > 0) {
        let percent = Math.min(logs.length * 20, 100);
        progress.style.width = percent + "%";
    }

    document.getElementById("logs").innerText =
        JSON.stringify(logs.slice(-5), null, 2);
}

setInterval(loadLogs, 3000);

</script>

</body>
</html>
